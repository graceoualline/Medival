# create and activate environment as follows:
#conda env create -f environment.yaml
#conda activate medival

name: medival
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # Python
  - python>=3.9,<3.13

  # Third-party Python packages
  - biopython
  - ete3
  - numpy
  - pandas
  - pyyaml
  - tqdm

  # External CLI tools called by the pipeline
  - blat
  - ucsc-fatotwobit
  - kraken2
  - skani=0.2.1